# worship.newpeoplech.com → 예배 관리 FastAPI
#
# Linux (sites-available):
#   sudo cp deploy/nginx-worship.conf /etc/nginx/sites-available/worship.newpeoplech.com
#   sudo ln -sf /etc/nginx/sites-available/worship.newpeoplech.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Windows (nginx 설치 폴더 conf.d):
#   copy deploy\nginx-worship.conf C:\nginx\conf\conf.d\worship.newpeoplech.com.conf
#   nginx -t && nginx -s reload
#
# nginx와 FastAPI가 다른 PC면 아래 upstream 주소를 예배 PC IP로 바꾸세요.

upstream worship_admin {
    server 127.0.0.1:8000;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;
    server_name worship.newpeoplech.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name worship.newpeoplech.com;

    # certbot 사용 시 (Linux)
    ssl_certificate     /etc/letsencrypt/live/worship.newpeoplech.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/worship.newpeoplech.com/privkey.pem;

    # Windows nginx + 수동 인증서 예:
    # ssl_certificate     C:/nginx/ssl/worship.newpeoplech.com/fullchain.pem;
    # ssl_certificate_key C:/nginx/ssl/worship.newpeoplech.com/privkey.pem;

    ssl_session_timeout 1d;
    ssl_session_cache shared:WorshipSSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 32m;

    location / {
        proxy_pass http://worship_admin;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}
