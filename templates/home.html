{% extends "base_admin.html" %}

{% block content %}
<div class="page-head">
  <div>
    <h1>홈</h1>
  </div>
</div>

<section class="card-lite home-section">
  <div class="card-lite-h">
    <h2><i class="fa-solid fa-bolt me-2"></i>빠른 시작</h2>
  </div>
  <form class="quick-start-form" id="quick-hymn-form">
    <label class="quick-start-label" for="quick-hymn-num">찬송가</label>
    <input
      type="number"
      class="form-control quick-start-input"
      id="quick-hymn-num"
      min="1"
      max="645"
      inputmode="numeric"
      placeholder="장"
      autocomplete="off"
    >
    <span class="quick-start-suffix">장</span>
    <button type="submit" class="btn-dark-pill" id="quick-hymn-run">
      <i class="fa-solid fa-play me-1"></i>실행
    </button>
  </form>
  <form class="quick-start-form quick-start-form-secondary" id="quick-responsive-form">
    <label class="quick-start-label" for="quick-responsive-num">교독문</label>
    <input
      type="number"
      class="form-control quick-start-input"
      id="quick-responsive-num"
      min="1"
      max="999"
      inputmode="numeric"
      placeholder="장"
      autocomplete="off"
    >
    <span class="quick-start-suffix">장</span>
    <button type="submit" class="btn-dark-pill" id="quick-responsive-run">
      <i class="fa-solid fa-play me-1"></i>실행
    </button>
  </form>
</section>

<section class="card-lite home-section">
  <div class="card-lite-h">
    <h2><i class="fa-solid fa-star me-2"></i>즐겨찾기</h2>
  </div>

  <div class="fav-grid-2">
    <div class="fav-subcard">
      <h3 class="fav-block-title">폴더</h3>
      <div class="quick-grid quick-grid-2" id="home-folders"></div>
    </div>

    <div class="fav-subcard">
      <h3 class="fav-block-title">파일</h3>
      <div class="quick-grid quick-grid-2" id="home-files"></div>
    </div>
  </div>
</section>

<div id="home-status" class="small text-muted mt-3"></div>
{% endblock %}

{% block scripts %}
<script src="/static/js/toast.js"></script>
<script src="/static/js/home.js"></script>
{% endblock %}
