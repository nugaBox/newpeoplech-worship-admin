{% extends "base_admin.html" %}

{% block content %}
<div class="page-head">
  <div>
    <h1>목차 관리</h1>
    <p class="sub">주일낮예배·주일찬양예배 목차를 입력하고 저장합니다.</p>
  </div>
  <div class="page-actions">
    <button type="button" class="btn-ghost" id="outline-btn-new">새 목차</button>
    <button type="button" class="btn-ghost" id="outline-btn-load-sample">샘플 불러오기</button>
    <button type="button" class="btn-dark-pill" id="outline-btn-save">
      <i class="fa-solid fa-check me-1"></i>저장
    </button>
  </div>
</div>

<div class="row g-4">
  <div class="col-lg-3">
    <div class="card-lite">
      <div class="card-lite-h"><h2>저장된 목차</h2></div>
      <div class="outline-list" id="outline-list"></div>
    </div>
  </div>

  <div class="col-lg-9">
    <div class="card-lite">
      <div class="card-lite-h d-flex justify-content-between align-items-center">
        <h2 id="outline-form-title">새 목차</h2>
        <input type="hidden" id="outline-id" value="">
      </div>

      <ul class="nav nav-pills mb-3" id="outline-tabs">
        <li class="nav-item"><button class="nav-link active" data-tab="basic">기본 정보</button></li>
        <li class="nav-item"><button class="nav-link" data-tab="day">주일낮예배</button></li>
        <li class="nav-item"><button class="nav-link" data-tab="praise">주일찬양예배</button></li>
      </ul>

      <div id="outline-fields-container"></div>
    </div>
  </div>
</div>

<div id="outline-status" class="small text-muted mt-3"></div>
{% endblock %}

{% block scripts %}
<script src="/static/js/outline.js"></script>
{% endblock %}
